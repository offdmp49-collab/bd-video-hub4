<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Video Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;padding-bottom:70px}
/* TOP BANNER */
.top-banner{background:linear-gradient(90deg,#e50914,#b0060f);padding:8px;text-align:center;font-size:13px;font-weight:700;letter-spacing:1px;color:#fff}
/* HEADER */
header{background:#111;padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e50914;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{background:#e50914;color:#fff;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px}
.logo-text{font-size:20px;font-weight:700;color:#fff}.logo-text span{color:#e50914}
.search-btn{background:#e50914;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-weight:600}
/* SECTION TITLE */
.section-header{background:linear-gradient(90deg,#e50914,#111);padding:10px 15px;display:flex;align-items:center;gap:8px;margin:8px 0 0}
.section-header .date{background:#fff;color:#e50914;font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px}
.section-header .title{font-size:14px;font-weight:700;color:#fff;letter-spacing:1px}
/* POSTS GRID */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px}
@media(min-width:600px){.posts-grid{grid-template-columns:repeat(4,1fr)}}
/* POST CARD */
.post-card{background:#1a1a1a;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;border:1px solid #222;transition:border-color 0.2s}
.post-card:active{border-color:#e50914}
.thumb-wrap{position:relative;aspect-ratio:16/9;background:#111;overflow:hidden}
.post-thumb{width:100%;height:100%;object-fit:cover;display:block}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#2a1010);font-size:30px}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;background:rgba(229,9,20,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.badge-hd{position:absolute;top:4px;left:4px;background:#e50914;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px}
.badge-premium{position:absolute;top:4px;left:28px;background:#f5a623;color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px}
.post-info{padding:6px 6px 8px}
.post-title{font-size:11px;line-height:1.4;color:#ddd;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* TRENDING - full width cards */
.trending-grid{display:flex;flex-direction:column;gap:0;padding:0}
.trending-card{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid #1a1a1a;cursor:pointer;background:#111;transition:background 0.2s}
.trending-card:active{background:#1a1a1a}
.trending-thumb{width:120px;min-width:120px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;position:relative;background:#1a1a1a}
.trending-thumb img{width:100%;height:100%;object-fit:cover}
.trending-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.trending-title{font-size:13px;font-weight:600;line-height:1.4;color:#eee;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.trending-meta{font-size:11px;color:#888}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #e50914;display:flex;justify-content:space-around;padding:8px 0 4px;z-index:200}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;color:#888;min-width:50px}
.nav-item.active{color:#e50914}
.nav-icon{font-size:20px}
.nav-badge{background:#e50914;color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700}
/* VIDEO MODAL */
#videoModal{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column;overflow-y:auto}
#videoModal.active{display:flex}
.modal-header{background:#111;padding:12px 15px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #e50914;position:sticky;top:0;z-index:10}
.modal-back{background:#e50914;border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title-text{font-size:14px;font-weight:700;flex:1;line-height:1.3}
.video-container{width:100%;aspect-ratio:16/9;background:#000}
.video-container iframe{width:100%;height:100%;border:none}
.modal-body{padding:15px}
.download-section{background:#1a1a1a;border-radius:10px;padding:15px;margin-top:10px}
.download-title{font-size:14px;font-weight:700;margin-bottom:10px;color:#e50914}
.download-btn{width:100%;background:linear-gradient(135deg,#e50914,#b0060f);color:#fff;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
/* LOADING */
#loadingDiv{text-align:center;padding:40px 20px;color:#666;grid-column:1/-1}
/* CHAT */
#chatFloat{position:fixed;bottom:80px;right:15px;z-index:300;cursor:pointer}
.chat-btn{width:50px;height:50px;background:#e50914;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 15px rgba(229,9,20,0.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 15px rgba(229,9,20,0.5)}50%{box-shadow:0 4px 25px rgba(229,9,20,0.8)}}
</style>
</head>
<body>

<div class="top-banner">🔥 BD VIDEO HUB — সেরা ভিডিও কালেকশন 🔥</div>

<header>
  <div class="logo">
    <div class="logo-icon">BD</div>
    <div class="logo-text">BD <span>Video</span></div>
  </div>
  <button class="search-btn">🔴 খুঁজুন</button>
</header>

<div id="mainContent">
  <div class="section-header">
    <span class="date" id="todayDate"></span>
    <span class="title">TODAY NEW</span>
  </div>
  <div class="posts-grid" id="postsGrid">
    <div id="loadingDiv">⏳ লোড হচ্ছে...</div>
  </div>

  <div class="section-header" style="margin-top:12px">
    <span style="font-size:18px">🔥</span>
    <span class="title">TRENDING NOW</span>
  </div>
  <div class="trending-grid" id="trendingGrid"></div>
</div>

<!-- Video Modal -->
<div id="videoModal">
  <div class="modal-header">
    <button class="modal-back" onclick="closeModal()">←</button>
    <div class="modal-title-text" id="modalTitle"></div>
  </div>
  <div class="video-container">
    <iframe id="modalIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
  <div class="modal-body">
    <div class="download-section">
      <div class="download-title">⬇️ ডাউনলোড করুন</div>
      <button class="download-btn" onclick="handleDownload()">📥 ডাউনলোড করুন</button>
    </div>
  </div>
</div>

<!-- Chat Float -->
<div id="chatFloat" onclick="this.style.display='none'">
  <div class="chat-btn">💬</div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="scrollToTop()">
    <div class="nav-icon">🏠</div>
    <div>হোম</div>
  </div>
  <div class="nav-item" onclick="scrollToSection('postsGrid')">
    <div class="nav-icon">🎬</div>
    <div>নতুন</div>
  </div>
  <div class="nav-item" onclick="scrollToTop()">
    <div class="nav-icon" style="background:#e50914;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-15px">🏠</div>
    <div></div>
  </div>
  <div class="nav-item" onclick="scrollToSection('trendingGrid')">
    <div class="nav-icon">📸 <span class="nav-badge" id="trendBadge"></span></div>
    <div>ট্রেন্ড</div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">🔍</div>
    <div>খুঁজুন</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLr4pS-8yO2CNbgz4I_R9uXKz3CXTrFHw",
  authDomain: "bd-video-hub4.firebaseapp.com",
  databaseURL: "https://bd-video-hub4-default-rtdb.firebaseio.com",
  projectId: "bd-video-hub4",
  storageBucket: "bd-video-hub4.firebasestorage.app",
  messagingSenderId: "189415289079",
  appId: "1:189415289079:web:c0d57fd5468375616ee3f2",
  measurementId: "G-GX3DSN8FB4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Today date
const now = new Date();
document.getElementById('todayDate').textContent = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;

let siteSettings = { popunderUrl:'', monetagDirectUrl:'', adsterraBannerUrl:'' };
let clickCountMap = {}; // per post click count
let popunderFired = false;
let currentPost = null;

// Load settings
const settingsRef = ref(db, 'settings');
onValue(settingsRef, snap => { if(snap.exists()) siteSettings = {...siteSettings, ...snap.val()}; });

// Load posts
const postsRef = ref(db, 'posts');
onValue(postsRef, snap => {
  document.getElementById('loadingDiv')?.remove();
  const grid = document.getElementById('postsGrid');
  const tGrid = document.getElementById('trendingGrid');
  grid.innerHTML = '';
  tGrid.innerHTML = '';

  if(!snap.exists()){
    grid.innerHTML = '<p style="padding:20px;color:#666;grid-column:1/-1">কোনো পোস্ট নেই</p>';
    return;
  }

  const posts = [];
  snap.forEach(c => posts.push({id:c.key,...c.val()}));
  posts.reverse();

  let tCount = 0;
  posts.forEach(post => {
    if(!post.active) return;
    if(post.trending && tCount < 8){
      tGrid.appendChild(makeTrendingCard(post));
      tCount++;
      document.getElementById('trendBadge').textContent = tCount;
    } else {
      grid.appendChild(makeCard(post));
    }
  });

  if(!grid.children.length) grid.innerHTML = '<p style="padding:20px;color:#666;grid-column:1/-1">কোনো পোস্ট নেই</p>';
  if(!tGrid.children.length) tGrid.innerHTML = '<p style="padding:20px;color:#666">কোনো ট্রেন্ডিং পোস্ট নেই</p>';
});

function makeCard(post){
  const d = document.createElement('div');
  d.className = 'post-card';
  d.innerHTML = `
    <div class="thumb-wrap">
      ${post.thumbnail ? `<img class="post-thumb" src="${post.thumbnail}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>🎬</div>'">` : '<div class="thumb-placeholder">🎬</div>'}
      <div class="play-btn">▶</div>
      <div class="badge-hd">HD</div>
      ${post.badge ? `<div class="badge-premium">${post.badge}</div>` : '<div class="badge-premium">PREMIUM</div>'}
    </div>
    <div class="post-info"><div class="post-title">${post.title||'No Title'}</div></div>
  `;
  d.addEventListener('click', () => handleClick(post));
  return d;
}

function makeTrendingCard(post){
  const d = document.createElement('div');
  d.className = 'trending-card';
  d.innerHTML = `
    <div class="trending-thumb">
      ${post.thumbnail ? `<img src="${post.thumbnail}" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px">🎬</div>'}
      <div class="badge-hd" style="position:absolute;top:4px;left:4px">HD</div>
      <div class="badge-premium" style="position:absolute;top:4px;left:28px">PREMIUM</div>
    </div>
    <div class="trending-info">
      <div class="trending-title">${post.title||'No Title'}</div>
      <div class="trending-meta">👁 ${post.views||0} views</div>
    </div>
  `;
  d.addEventListener('click', () => handleClick(post));
  return d;
}

function handleClick(post){
  if(!clickCountMap[post.id]) clickCountMap[post.id] = 0;
  clickCountMap[post.id]++;
  const c = clickCountMap[post.id];

  if(c === 1){
    // Popunder
    if(!popunderFired && siteSettings.popunderUrl){
      window.open(siteSettings.popunderUrl, '_blank');
      popunderFired = true;
    }
  } else if(c === 2){
    // Per-post direct link
    if(post.directLink) window.open(post.directLink, '_blank');
  } else if(c === 3){
    // Monetag direct link
    if(siteSettings.monetagDirectUrl) window.open(siteSettings.monetagDirectUrl, '_blank');
  } else {
    // 4th click: show video
    clickCountMap[post.id] = 0;
    showVideo(post);
    // increment view count
    const viewRef = ref(db, `posts/${post.id}/views`);
    runTransaction(viewRef, v => (v||0)+1);
  }
}

function showVideo(post){
  currentPost = post;
  document.getElementById('modalTitle').textContent = post.title||'';
  document.getElementById('modalIframe').src = post.videoEmbed||'';
  document.getElementById('videoModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

window.closeModal = function(){
  document.getElementById('videoModal').classList.remove('active');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
  currentPost = null;
}

window.handleDownload = function(){
  if(!currentPost) return;
  if(siteSettings.adsterraBannerUrl) window.open(siteSettings.adsterraBannerUrl, '_blank');
  if(currentPost.downloadUrl){
    setTimeout(() => window.open(currentPost.downloadUrl, '_blank'), 800);
  }
}

window.scrollToTop = () => window.scrollTo({top:0,behavior:'smooth'});
window.scrollToSection = id => document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
</script>
</body>
</html>
